user  nginx;
worker_processes  auto;

http {
    # BASIC SETTINGS
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    types_hash_max_size 2048;

    # Required for attachments
    client_max_body_size 10m;

    # Enable gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    include mime.types;

    # Disallow embedding in iFrames
    add_header X-Frame-Options deny;

    # Shared API proxy snippet is inlined in both server blocks.

    # Admin portal on admin.* host (Option C).
    # Dokploy/Traefik should route admin.<domain> to this nginx service.
    server {
        listen 80;
        server_name ~^admin\.;

        location /server {
            resolver 127.0.0.11 valid=60s;
            set $server "http://server:3000";
            proxy_pass $server;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        location / {
            root /admin;
            index index.html;
            try_files $uri /index.html;
        }
    }

    # Main PWA + API on the primary domain
    server {
        listen 80 default_server;
        server_name _;

        location /server {
            resolver 127.0.0.11 valid=60s;
            set $server "http://server:3000";
            proxy_pass $server;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        location / {
            root /pwa;
            index index.html;
            try_files $uri /index.html;
        }
    }
}

events {
}
