services:
    server:
        image: padloc/server:local
        build:
            context: ../../../../..
            dockerfile: Dockerfile-server
        environment:
            PL_DATA_BACKEND: leveldb
            PL_DATA_LEVELDB_DIR: /data
            PL_ATTACHMENTS_BACKEND: fs
            PL_ATTACHMENTS_FS_DIR: /attachments
            PL_SERVER_CLIENT_URL: http://localhost
            PL_EMAIL_BACKEND: console
        expose:
            - "3000"
        volumes:
            - attachments:/attachments
            - data:/data
        restart: unless-stopped

    pwa:
        image: padloc/pwa:local
        environment:
            PL_SERVER_URL: http://localhost/server
            PL_PWA_URL: http://localhost
            PL_PWA_PORT: 80
            PL_PWA_DIR: /pwa
        build:
            context: ../../../../..
            dockerfile: Dockerfile-pwa
        volumes:
            - pwa:/pwa
        command: ["build"]
        restart: on-failure

    nginx:
        image: nginx
        depends_on:
            - server
        restart: always
        volumes:
            - pwa:/pwa
            - ./nginx.conf:/etc/nginx/nginx.conf
        ports:
            - "80:80"

volumes:
    data:
    attachments:
    pwa:
