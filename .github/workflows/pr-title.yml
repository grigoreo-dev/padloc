name: PR Title

on:
    pull_request:
        types:
            - opened
            - edited
            - reopened
            - synchronize

permissions:
    contents: read
    pull-requests: read

jobs:
    pr-title:
        name: PR Title
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      docs
                      chore
                      ci
                      test
                      refactor
                      build
                      perf
                      revert
                  requireScope: false
