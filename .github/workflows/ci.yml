name: CI

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Biome check
              run: pnpm run lint
            - name: Run translation checks
              run: |
                  pnpm run locale:extract
                  if [ $(git status --porcelain | wc -l) -ne "0" ]; then
                    echo "Missing translations detected."
                    exit 1
                  fi

    build:
        name: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Build PWA
              run: pnpm run pwa:build
            - name: Build web extension
              run: pnpm run web-extension:build
            - name: Build admin
              run: pnpm run admin:build
            - name: Test zero-config server startup
              run: pnpm run server:start-dry

    unit:
        name: unit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run unit tests
              run: pnpm test

    e2e:
        name: e2e
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium
            - name: Start maildev
              run: |
                  docker run -d --name padloc-e2e-maildev \
                    -p 1025:1025 -p 1080:1080 \
                    maildev/maildev:2.1.0
                  for i in $(seq 1 60); do
                    body="$(curl -sf http://localhost:1080/email 2>/dev/null || true)"
                    if [[ "$body" == \[* ]]; then
                      echo "maildev ready"
                      exit 0
                    fi
                    sleep 0.5
                  done
                  echo "maildev failed to start" >&2
                  docker logs padloc-e2e-maildev || true
                  exit 1
            - name: Run E2E tests
              env:
                  E2E_MAILDEV_URL: http://localhost:1080
              run: pnpm run test:e2e:ci
            - name: Upload Playwright artifacts
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-artifacts
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore
                  retention-days: 7
