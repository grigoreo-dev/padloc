name: CI

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run prettier check
              run: pnpm run prettier:check
            - name: Run translation checks
              run: |
                  pnpm run locale:extract
                  if [ $(git status --porcelain | wc -l) -ne "0" ]; then
                    echo "Missing translations detected."
                    exit 1
                  fi

    build:
        name: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Build PWA
              run: pnpm run pwa:build
            - name: Build web extension
              run: pnpm run web-extension:build
            - name: Build admin
              run: pnpm run admin:build
            - name: Test zero-config server startup
              run: pnpm run server:start-dry

    unit:
        name: unit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run unit tests
              run: pnpm test
