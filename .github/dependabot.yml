version: 2

updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 5
      groups:
          npm-minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
      commit-message:
          prefix: "chore"
          include: "scope"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:30"
      groups:
          github-actions:
              patterns:
                  - "*"
      commit-message:
          prefix: "ci"
          include: "scope"
