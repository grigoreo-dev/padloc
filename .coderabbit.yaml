# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
    profile: "chill"
    request_changes_workflow: false
    high_level_summary: true
    poem: false
    review_status: true
    review_details: false
    auto_review:
        enabled: true
        drafts: false
        labels:
            - "!skip-ai-review"
    path_filters:
        - "!**/node_modules/**"
        - "!**/pnpm-lock.yaml"
        - "!**/package-lock.json"
        - "!docs/superpowers/**"
        - "!**/.superpowers/**"
        - "!packages/*/dist/**"
        - "!packages/*/build/**"
        - "!packages/*/target/**"

chat:
    auto_reply: true
